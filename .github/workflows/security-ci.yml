name: Security CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  security-baseline:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/moneyfest?sslmode=disable
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: npm audit high
        run: npm run security:audit
